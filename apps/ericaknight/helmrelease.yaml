apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ericaknight
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: {remediation: {retries: 3}}
  upgrade: {remediation: {retries: 3}}
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
    controllers:
      main:
        strategy: Recreate
        replicas: 1
        pod:
          nodeSelector:
            kubernetes.io/hostname: ${PRIMARY_NODE_NAME}
        containers:
          main:
            image:
              repository: ghcr.io/khzaw/ericaknight
              tag: 1781346093-2fee384ba0688c37327ded7431fb1f6bbcc8b2ac # {"$imagepolicy": "flux-system:ericaknight:tag"}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
            resources:
              requests:
                cpu: "8m"
                memory: "24Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
    service:
      main:
        ports:
          http:
            port: 8080
    ingress:
      main:
        enabled: false
