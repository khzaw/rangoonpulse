# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
  namespace: default
spec:
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: "4.2.0"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: talos-7nf-osf

    controllers:
      main:
        replicas: 1
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: v1.2.0
            env:
              TZ: "Asia/Singapore"
              PUID: "1000"
              PGID: "1000"
              SESSION_COOKIE_SECURE: "true"
              CALIBRE_WEB_URL: "https://calibre.khzaw.dev"
              AUDIOBOOK_LIBRARY_URL: "https://audiobookshelf.khzaw.dev"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8084
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8084
                  initialDelaySeconds: 15
                  periodSeconds: 15
            resources:
              requests:
                cpu: "200m"
                memory: "512Mi"
              limits:
                cpu: "1500m"
                memory: "2Gi"

    service:
      main:
        controller: main
        ports:
          http:
            port: 8084

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: shelfmark.khzaw.dev
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: shelfmark.khzaw.dev
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: shelfmark-tls
            hosts:
              - shelfmark.khzaw.dev

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: app-configs-pvc-nfs
        advancedMounts:
          main:
            main:
              - path: /config
                subPath: shelfmark

      calibre-books:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: calibre-books-nfs
        globalMounts:
          - path: /books

      calibre-config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: app-configs-pvc-nfs
        advancedMounts:
          main:
            main:
              - path: /integrations/calibre
                subPath: calibre
                readOnly: true

      calibre-web-automated-config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: app-configs-pvc-nfs
        advancedMounts:
          main:
            main:
              - path: /integrations/calibre-web-automated
                subPath: calibre-web-automated
                readOnly: true

      booklore-bookdrop:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: booklore
        advancedMounts:
          main:
            main:
              - path: /bookdrop
                subPath: bookdrop

      audiobooks:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: books
        advancedMounts:
          main:
            main:
              - path: /audiobooks
                subPath: audiobooks
