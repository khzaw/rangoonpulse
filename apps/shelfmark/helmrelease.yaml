# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
  namespace: default
spec:
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${PRIMARY_NODE_NAME}

    controllers:
      main:
        replicas: 1
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: v1.2.1
            env:
              TZ: "${TIMEZONE}"
              PUID: "1000"
              PGID: "1000"
              SESSION_COOKIE_SECURE: "true"
              CALIBRE_WEB_URL: "https://calibre.${BASE_DOMAIN}"
              AUDIOBOOK_LIBRARY_URL: "https://audiobookshelf.${BASE_DOMAIN}"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8084
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8084
                  initialDelaySeconds: 60
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8084
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: "84m"
                memory: "417Mi"
              limits:
                cpu: "633m"
                memory: "864Mi"
    service:
      main:
        controller: main
        ports:
          http:
            port: 8084

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: shelfmark.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: shelfmark.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: shelfmark-tls
            hosts:
              - shelfmark.${BASE_DOMAIN}

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: app-configs-pvc-nfs
        advancedMounts:
          main:
            main:
              - path: /config
                subPath: shelfmark
              - path: /integrations/calibre
                subPath: calibre
                readOnly: true
              - path: /integrations/calibre-web-automated
                subPath: calibre-web-automated
                readOnly: true

      calibre-books:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: calibre-books-nfs
        globalMounts:
          - path: /books

      booklore-bookdrop:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: booklore
        advancedMounts:
          main:
            main:
              - path: /bookdrop
                subPath: bookdrop

      audiobooks:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: books
        advancedMounts:
          main:
            main:
              - path: /audiobooks
                subPath: audiobooks
