# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: transmission
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "4.2.0"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: transmission-vpn-state
      valuesKey: values.yaml
      optional: true
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: talos-7nf-osf

    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: lscr.io/linuxserver/transmission
              tag: 4.1.1-r1-ls333
            env:
              TZ: "Asia/Singapore"
              PUID: "1000"
              GUID: "1000"
            resources:
              requests:
                cpu: "150m"
                memory: "512Mi"
              limits:
                cpu: "1000m"
                memory: "2Gi"
          gluetun:
            enabled: false
            image:
              repository: qmcgaw/gluetun
              tag: v3.40.0
            env:
              TZ: "Asia/Singapore"
              VPN_SERVICE_PROVIDER: custom
              VPN_TYPE: wireguard
              HTTP_CONTROL_SERVER_ADDRESS: ":8000"
              FIREWALL_INPUT_PORTS: "9091,51413"
              FIREWALL_OUTBOUND_SUBNETS: "10.96.0.0/12,10.244.0.0/16,10.0.0.0/24"
              WIREGUARD_ENDPOINT_IP: "198.51.100.10"
              WIREGUARD_ENDPOINT_PORT: "51820"
              WIREGUARD_PUBLIC_KEY: "REPLACE_ME_WITH_PROVIDER_PUBLIC_KEY"
              WIREGUARD_ADDRESSES: "10.64.0.2/32"
            envFrom:
              - secretRef:
                  name: transmission-vpn-secret
              - secretRef:
                  name: transmission-gluetun-control-secret
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_ADMIN
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "300m"
                memory: "256Mi"
          gluetun-webui:
            image:
              repository: scuzza/gluetun-webui
              tag: 1.0.0
            env:
              PORT: "3000"
              TRUST_PROXY: "true"
              GLUETUN_CONTROL_URL: http://127.0.0.1:8000
            envFrom:
              - secretRef:
                  name: transmission-gluetun-control-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: "15m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "192Mi"

    service:
      main:
        ports:
          http:
            port: 9091
      p2p:
        enabled: true
        type: LoadBalancer
        ports:
          tcp:
            enabled: true
            port: 51413
            protocol: TCP
            targetPort: 51413
          udp:
            enabled: true
            port: 51413
            protocol: UDP
            targetPort: 51413

    ingress:
      main:
        enabled: true
        className: nginx
        hosts:
          - host: torrent.khzaw.dev
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http

        annotations:
          external-dns.alpha.kubernetes.io/hostname: torrent.khzaw.dev
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          cert-manager.io/cluster-issuer: letsencrypt-prod

        tls:
          - secretName: transmission-tls
            hosts:
              - torrent.khzaw.dev
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: local-path
        size: 1Gi
        accessMode: ReadWriteOnce

      downloads:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: downloads
      tun:
        enabled: true
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        advancedMounts:
          main:
            gluetun:
              - path: /dev/net/tun
      tmp:
        enabled: true
        type: emptyDir
        advancedMounts:
          main:
            gluetun-webui:
              - path: /tmp
