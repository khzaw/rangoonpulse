apiVersion: v1
kind: ConfigMap
metadata:
  name: transmission-vpn-control
  namespace: default
data:
  default-mode: direct
  runtime-configmap: transmission-vpn-state
  provider: custom
  vpn-type: wireguard
  placeholder-config: "true"
  direct-values.yaml: |
    controllers:
      main:
        pod:
          annotations:
            khzaw.dev/transmission-egress-mode: direct
          dnsPolicy: ClusterFirst
        containers:
          gluetun:
            enabled: false
  vpn-values.yaml: |
    controllers:
      main:
        pod:
          annotations:
            khzaw.dev/transmission-egress-mode: vpn
          dnsPolicy: None
          dnsConfig:
            nameservers:
              - 127.0.0.1
        containers:
          gluetun:
            enabled: true
