# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bookorbit-postgres
  namespace: default
spec:
  interval: 24h
  timeout: 15m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${PRIMARY_NODE_NAME}
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: pgvector/pgvector
              tag: "pg18"
            env:
              TZ: "${TIMEZONE}"
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: POSTGRES_PASSWORD
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: POSTGRES_DB
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "750m"
                memory: "1Gi"
            probes:
              startup:
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              readiness:
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              liveness:
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3

    service:
      main:
        controller: main
        ports:
          postgres:
            port: 5432

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /var/lib/postgresql/data

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bookorbit
  namespace: default
spec:
  interval: 24h
  timeout: 20m
  dependsOn:
    - name: bookorbit-postgres
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${PRIMARY_NODE_NAME}
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/bookorbit/bookorbit
              tag: "2.2.0"
            env:
              TZ: "${TIMEZONE}"
              NODE_ENV: production
              PORT: "3000"
              APP_URL: https://bookorbit.${BASE_DOMAIN}
              CLIENT_URL: https://bookorbit.${BASE_DOMAIN}
              POSTGRES_HOST: bookorbit-postgres
              POSTGRES_PORT: "5432"
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: POSTGRES_PASSWORD
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: POSTGRES_DB
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: JWT_SECRET
              SETUP_BOOTSTRAP_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: SETUP_BOOTSTRAP_TOKEN
              PUID: "1000"
              PGID: "1000"
              LIBRARY_BROWSE_ROOT: /books
              BOOKORBIT_FIX_PERMISSIONS: "true"
              NODE_MAX_OLD_SPACE_SIZE: auto
            resources:
              requests:
                cpu: "100m"
                memory: "512Mi"
              limits:
                cpu: "1000m"
                memory: "2Gi"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
                  - SETGID
                  - SETUID
            probes:
              startup:
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
              readiness:
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              liveness:
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: 3000
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3

    service:
      main:
        controller: main
        ports:
          http:
            port: 3000

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: bookorbit.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: bookorbit.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: bookorbit-tls
            hosts:
              - bookorbit.${BASE_DOMAIN}

      books:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: books.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/permanent-redirect: https://bookorbit.${BASE_DOMAIN}$${request_uri}
          nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: books.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: bookorbit-books-tls
            hosts:
              - books.${BASE_DOMAIN}

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: truenas-nfs
        accessMode: ReadWriteOnce
        size: 5Gi
        advancedMounts:
          main:
            main:
              - path: /data

      books:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: calibre-books-nfs
        advancedMounts:
          main:
            main:
              - path: /books
                readOnly: true

      tmp:
        enabled: true
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /tmp
