# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multica-postgres
  namespace: default
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${PRIMARY_NODE_NAME}
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: pgvector/pgvector
              tag: "pg17"
            env:
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: multica-db-secret
                    key: POSTGRES_DB
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: multica-db-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: multica-db-secret
                    key: POSTGRES_PASSWORD
              PGDATA: /var/lib/postgresql/data/pgdata
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "1000m"
                memory: "1Gi"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
            probes:
              startup:
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              readiness:
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              liveness:
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3

    service:
      main:
        controller: main
        ports:
          postgres:
            port: 5432

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /var/lib/postgresql/data
