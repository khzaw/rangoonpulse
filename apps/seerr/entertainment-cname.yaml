# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.0-standalone-strict/service-v1.json
---
apiVersion: v1
kind: Service
metadata:
  name: seerr-entertainment-cname
  namespace: default
  annotations:
    # Publish entertainment.${BASE_DOMAIN} as a CNAME to seerr.${BASE_DOMAIN}.
    # external-dns must watch Services (`--source=service`) for this to work.
    external-dns.alpha.kubernetes.io/hostname: entertainment.${BASE_DOMAIN}
spec:
  type: ExternalName
  externalName: seerr.${BASE_DOMAIN}
