# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: exposure-control
  namespace: default
spec:
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${UTILITY_NODE_NAME}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

    controllers:
      main:
        serviceAccount:
          name: exposure-control
        strategy: Recreate
        pod:
          annotations:
            reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: node
              tag: 24-alpine
            command:
              - node
              - /app-files/server.js
            env:
              APP_DIR: /app-files
              TZ: "${TIMEZONE}"
              PORT: "8080"
              DATA_DIR: /data
              SERVICES_FILE: /app-files/services.json
              TRAVEL_CONFIG_FILE: /app-files/travel.json
              PUBLIC_DOMAIN: ${BASE_DOMAIN}
              SHARE_HOST_PREFIX: ${SHARE_HOST_PREFIX}
              CONTROL_PANEL_HOST: controlpanel.${BASE_DOMAIN}
              GITHUB_API_URL: https://api.github.com
              GITHUB_REPOSITORY: khzaw/rangoonpulse
              RENOVATE_WORKFLOW_FILE: renovate.yaml
              RENOVATE_WORKFLOW_REF: master
              RENOVATE_STATUS_CACHE_TTL_SECONDS: "60"
              DEFAULT_EXPIRY_HOURS: "1"
              RECONCILE_INTERVAL_SECONDS: "30"
              DEFAULT_AUTH_MODE: cloudflare-access
              SHARE_RATE_LIMIT_REQUESTS: "120"
              SHARE_RATE_LIMIT_WINDOW_SECONDS: "60"
              IMAGE_UPDATE_CACHE_TTL_HOURS: "168"
              IMAGE_UPDATE_HTTP_TIMEOUT_MS: "6000"
              IMAGE_UPDATE_EXCLUDED_WORKLOADS: blog,mmcal,rangoon-mapper
              HELM_UPDATE_CACHE_TTL_HOURS: "168"
              HELM_UPDATE_HTTP_TIMEOUT_MS: "8000"
              TRAVEL_CACHE_TTL_SECONDS: "30"
              TRAVEL_HTTP_TIMEOUT_MS: "4000"
              TRANSMISSION_VPN_NAMESPACE: default
              TRANSMISSION_VPN_CONTROL_CONFIGMAP: transmission-vpn-control
              TRANSMISSION_VPN_RUNTIME_CONFIGMAP: transmission-vpn-state
              TRANSMISSION_VPN_WEBUI_URL: https://torrent-vpn.${BASE_DOMAIN}
            envFrom:
              - secretRef:
                  name: exposure-control-github
            resources:
              requests:
                cpu: "20m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: controlpanel.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        tls:
          - secretName: controlpanel-tls
            hosts:
              - controlpanel.${BASE_DOMAIN}
        hosts:
          - host: controlpanel.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 128Mi
        globalMounts:
          - path: /data

      app:
        enabled: true
        type: configMap
        name: exposure-control-app-files
        globalMounts:
          - path: /app-files
            readOnly: true
