# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.0-standalone-strict/service-v1.json
---
apiVersion: v1
kind: Service
metadata:
  name: glance-cname
  namespace: default
  annotations:
    # Publish glance.${BASE_DOMAIN} as a DNS alias to rangoonpulse.${BASE_DOMAIN}.
    # external-dns must watch Services (`--source=service`) for this to work.
    external-dns.alpha.kubernetes.io/hostname: glance.${BASE_DOMAIN}
spec:
  type: ExternalName
  externalName: rangoonpulse.${BASE_DOMAIN}
