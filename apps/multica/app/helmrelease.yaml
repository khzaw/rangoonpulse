# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multica
  namespace: default
spec:
  interval: 15m
  timeout: 15m
  dependsOn:
    - name: multica-postgres
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: ${PRIMARY_NODE_NAME}
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    controllers:
      main:
        strategy: Recreate
        containers:
          frontend:
            image:
              repository: ghcr.io/khzaw/multica-web
              tag: "1776614430-b8907dd"
            env:
              HOSTNAME: "0.0.0.0"
              PORT: "3000"
            resources:
              requests:
                cpu: "150m"
                memory: "256Mi"
              limits:
                cpu: "1000m"
                memory: "1Gi"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
            probes:
              startup:
                spec:
                  tcpSocket:
                    port: 3000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              readiness:
                spec:
                  tcpSocket:
                    port: 3000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              liveness:
                spec:
                  tcpSocket:
                    port: 3000
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3

          backend:
            image:
              repository: ghcr.io/khzaw/multica-backend
              tag: "1776614430-b8907dd"
            env:
              PORT: "8080"
              APP_ENV: production
              FRONTEND_ORIGIN: https://multica.${BASE_DOMAIN}
              CORS_ALLOWED_ORIGINS: https://multica.${BASE_DOMAIN}
              MULTICA_APP_URL: https://multica.${BASE_DOMAIN}
              RESEND_FROM_EMAIL: noreply@multica.ai
              LOCAL_UPLOAD_DIR: /app/data/uploads
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: multica-db-secret
                    key: DATABASE_URL
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: multica-app-secret
                    key: JWT_SECRET
            resources:
              requests:
                cpu: "250m"
                memory: "512Mi"
              limits:
                cpu: "1000m"
                memory: "1Gi"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
            probes:
              startup:
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              readiness:
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              liveness:
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3

    service:
      main:
        controller: main
        ports:
          http:
            port: 3000

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: multica.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: multica.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: multica-tls
            hosts:
              - multica.${BASE_DOMAIN}

    persistence:
      uploads:
        enabled: true
        type: persistentVolumeClaim
        storageClass: truenas-nfs
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          main:
            backend:
              - path: /app/data/uploads
