# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jackett
  namespace: default
spec:
  interval: 24h
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${UTILITY_NODE_NAME}

    controllers:
      main:
        containers:
          main:
            image:
              repository: lscr.io/linuxserver/jackett
              # renovate: datasource=github-releases depName=Jackett/Jackett
              tag: 0.24.2237
            env:
              TZ: "${TIMEZONE}"
              PUID: "1000"
              PGID: "1000"
              AUTO_UPDATE: "false"
            resources:
              requests:
                cpu: "75m"
                memory: "222Mi"
              limits:
                cpu: "375m"
                memory: "576Mi"
    service:
      main:
        controller: main
        ports:
          http:
            port: 9117

    ingress:
      main:
        enabled: true
        className: nginx
        hosts:
          - host: jackett.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http

        annotations:
          external-dns.alpha.kubernetes.io/hostname: jackett.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          cert-manager.io/cluster-issuer: letsencrypt-prod

        tls:
          - secretName: jackett-tls
            hosts:
              - jackett.${BASE_DOMAIN}

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: truenas-nfs
        size: 1Gi
        accessMode: ReadWriteMany
