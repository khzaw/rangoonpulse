# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speedtest
  namespace: default
spec:
  interval: 15m
  timeout: 10m
  dependsOn:
    - name: media-postgres
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${UTILITY_NODE_NAME}

    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: lscr.io/linuxserver/speedtest-tracker
              tag: v1.13.11-ls142
            env:
              - name: TZ
                value: "${TIMEZONE}"
              - name: PUID
                value: "1000"
              - name: PGID
                value: "1000"
              - name: APP_TIMEZONE
                value: "${TIMEZONE}"
              - name: APP_URL
                value: https://speedtest.${BASE_DOMAIN}
              - name: ASSET_URL
                value: https://speedtest.${BASE_DOMAIN}
              - name: APP_KEY
                valueFrom:
                  secretKeyRef:
                    name: speedtest-tracker-secret
                    key: APP_KEY
              - name: DB_CONNECTION
                value: pgsql
              - name: DB_HOST
                value: media-postgres
              - name: DB_PORT
                value: "5432"
              - name: DB_DATABASE
                value: speedtest_tracker
              - name: DB_USERNAME
                value: speedtest_tracker
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: speedtest-tracker-secret
                    key: POSTGRES_PASSWORD
              - name: SPEEDTEST_SCHEDULE
                value: 6 */6 * * *
              - name: DISPLAY_TIMEZONE
                value: "${TIMEZONE}"
            resources:
              requests:
                cpu: "25m"
                memory: "256Mi"
              limits:
                cpu: "500m"
                memory: "768Mi"
            probes:
              startup:
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 80
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              readiness:
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              liveness:
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /config

    service:
      main:
        controller: main
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: true
        className: nginx
        hosts:
          - host: speedtest.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        annotations:
          external-dns.alpha.kubernetes.io/hostname: speedtest.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        tls:
          - secretName: speedtest-tls
            hosts:
              - speedtest.${BASE_DOMAIN}
