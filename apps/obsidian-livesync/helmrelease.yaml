# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obsidian-livesync
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${PRIMARY_NODE_NAME}

    controllers:
      main:
        containers:
          main:
            image:
              repository: couchdb
              tag: "3.5.2"
            env:
              TZ: "${TIMEZONE}"
              COUCHDB_USER:
                valueFrom:
                  secretKeyRef:
                    name: obsidian-livesync-secret
                    key: COUCHDB_USER
              COUCHDB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: obsidian-livesync-secret
                    key: COUCHDB_PASSWORD
            resources:
              requests:
                cpu: "75m"
                memory: "192Mi"
              limits:
                cpu: "375m"
                memory: "768Mi"
            lifecycle:
              postStart:
                exec:
                  command:
                    - sh
                    - -c
                    - |
                      set_couchdb_config() {
                        section="$1"
                        key="$2"
                        value="$3"
                        curl -fsS -X PUT \
                          -H "Content-Type: application/json" \
                          -u "$COUCHDB_USER:$COUCHDB_PASSWORD" \
                          "http://127.0.0.1:5984/_node/_local/_config/$${section}/$${key}" \
                          -d "\"$${value}\""
                      }

                      for i in $(seq 1 30); do
                        if curl -fsS -u "$COUCHDB_USER:$COUCHDB_PASSWORD" \
                          http://127.0.0.1:5984/ >/dev/null; then
                          {
                            set_couchdb_config chttpd enable_cors true
                            set_couchdb_config httpd enable_cors true
                            set_couchdb_config cors credentials true
                            set_couchdb_config cors origins "app://obsidian.md,capacitor://localhost,http://localhost"
                            set_couchdb_config cors methods "GET,PUT,POST,HEAD,DELETE"
                            set_couchdb_config cors headers "accept,authorization,content-type,origin,referer,x-couchdb-requested-with"
                          } >/tmp/obsidian-livesync-cors.log 2>&1
                          exit 0
                        fi
                        sleep 2
                      done

                      echo "CouchDB did not become ready before CORS setup timed out" >/tmp/obsidian-livesync-cors.log
                      exit 0

    service:
      main:
        controller: main
        ports:
          http:
            port: 5984

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: livesync.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: livesync.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: livesync-tls
            hosts:
              - livesync.${BASE_DOMAIN}

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: obsidian-livesync-local
        globalMounts:
          - path: /opt/couchdb/data
