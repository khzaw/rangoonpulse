# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre
  namespace: default

spec:
  interval: 24h
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  uninstall:
    keepHistory: false

  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${PRIMARY_NODE_NAME}

    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: lscr.io/linuxserver/calibre
              tag: "v9.11.0-ls413"
            env:
              TZ: '${TIMEZONE}'
              PUID: "1000"
              PGID: "1000"
            resources:
              requests:
                cpu: "35m"
                memory: "1196Mi"
              limits:
                cpu: "316m"
                memory: "2189Mi"
    service:
      main:
        ports:
          http:
            port: 8080 # web GUI access via KasmVNC
          https:
            port: 8181
          server:
            port: 8081 # content server

    ingress:
      main:
        enabled: false

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: app-configs-pvc-nfs
        advancedMounts:
          main:
            main:
              - path: /config
                subPath: calibre

      books:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: calibre-books-nfs
        globalMounts:
          - path: /books
