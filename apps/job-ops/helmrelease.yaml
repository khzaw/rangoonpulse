# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: job-ops
  namespace: default
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: app-template
      version: "4.2.0"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: talos-7nf-osf

    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/dakheera47/job-ops
              tag: v0.1.29
            env:
              TZ: "Asia/Singapore"
              NODE_ENV: production
              PORT: "3001"
              PYTHON_PATH: /usr/bin/python3
              DATA_DIR: /app/data
              JOBOPS_PUBLIC_BASE_URL: https://job-ops.khzaw.dev
            resources:
              requests:
                cpu: "250m"
                memory: "512Mi"
              limits:
                cpu: "2000m"
                memory: "3Gi"
            probes:
              startup:
                spec:
                  httpGet:
                    path: /health
                    port: 3001
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
              liveness:
                spec:
                  httpGet:
                    path: /health
                    port: 3001
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                spec:
                  httpGet:
                    path: /health
                    port: 3001
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6

    service:
      main:
        controller: main
        ports:
          http:
            port: 3001

    ingress:
      main:
        enabled: true
        className: nginx
        hosts:
          - host: job-ops.khzaw.dev
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        annotations:
          external-dns.alpha.kubernetes.io/hostname: job-ops.khzaw.dev
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "25m"
          nginx.ingress.kubernetes.io/proxy-buffering: "off"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        tls:
          - secretName: job-ops-tls
            hosts:
              - job-ops.khzaw.dev

    persistence:
      # Job Ops stores SQLite state, backups, and generated PDFs under /app/data.
      # Keep that node-local to avoid SQLite WAL/locking problems on NFS.
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /app/data
