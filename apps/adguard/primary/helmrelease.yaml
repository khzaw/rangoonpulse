# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard
  namespace: default
spec:
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install: { remediation: { retries: 3 } }
  upgrade: { remediation: { retries: 3 } }
  values:
    controllers:
      main:
        strategy: Recreate
        pod:
          nodeSelector:
            kubernetes.io/hostname: ${UTILITY_NODE_NAME}
        containers:
          main:
            image:
              repository: adguard/adguardhome
              tag: v0.107.73
            command:
              - sh
              - -c
            args:
              - |
                set -eu
                DATA=/adguard-data
                CFG="$DATA/conf/AdGuardHome.yaml"
                WORK="$DATA/work"

                if ! grep -q " $DATA " /proc/self/mountinfo; then
                  echo "expected $DATA to be a mounted PVC; refusing to start on container overlay" >&2
                  exit 1
                fi

                mkdir -p "$DATA/conf" "$WORK/data"

                if [ ! -f "$CFG" ]; then
                  # Seed a valid baseline config so a recreated PVC does not fall
                  # back to the AdGuard first-run wizard on port 3000.
                  printf '%s\n' \
                    'http:' \
                    '  address: 0.0.0.0:80' \
                    'users: []' \
                    'dns:' \
                    '  bind_hosts:' \
                    '    - 0.0.0.0' \
                    '  port: 53' \
                    '  upstream_dns:' \
                    '    - 1.1.1.1' \
                    '    - 1.0.0.1' \
                    '  upstream_mode: fastest_addr' \
                    '  fastest_timeout: 1s' \
                    '  cache_size: 16777216' \
                    '  cache_ttl_min: 60' \
                    '  cache_ttl_max: 3600' \
                    '  cache_optimistic: true' \
                    '  upstream_timeout: 3s' \
                    'querylog:' \
                    '  enabled: true' \
                    'statistics:' \
                    '  enabled: true' \
                    'filters: []' \
                    'whitelist_filters: []' \
                    'user_rules: []' \
                    'dhcp:' \
                    '  enabled: false' \
                    > "$CFG"
                fi

                # Keep key DNS performance settings in GitOps so runtime changes do not drift.
                if [ -f "$CFG" ]; then
                  sed -i -E 's/^  address:.*/  address: 0.0.0.0:80/' "$CFG"
                  sed -i -E 's/^  upstream_mode:.*/  upstream_mode: fastest_addr/' "$CFG"
                  sed -i -E 's/^  fastest_timeout:.*/  fastest_timeout: 1s/' "$CFG"
                  sed -i -E 's/^  cache_size:.*/  cache_size: 16777216/' "$CFG"
                  sed -i -E 's/^  cache_ttl_min:.*/  cache_ttl_min: 60/' "$CFG"
                  sed -i -E 's/^  cache_ttl_max:.*/  cache_ttl_max: 3600/' "$CFG"
                  sed -i -E 's/^  cache_optimistic:.*/  cache_optimistic: true/' "$CFG"
                  sed -i -E 's/^  upstream_timeout:.*/  upstream_timeout: 3s/' "$CFG"
                fi

                # Keep DHCP disabled in the Kubernetes deployment model (router handles DHCP).
                if [ -f "$CFG" ]; then
                  TMP="$(mktemp)"
                  awk '
                    BEGIN { in_dhcp = 0; replaced = 0 }
                    function print_dhcp_block() {
                      print "dhcp:"
                      print "  enabled: false"
                      print "  interface_name: \"\""
                      print "  local_domain_name: lan"
                      print "  dhcpv4:"
                      print "    gateway_ip: \"\""
                      print "    subnet_mask: \"\""
                      print "    range_start: \"\""
                      print "    range_end: \"\""
                      print "    lease_duration: 86400"
                      print "    icmp_timeout_msec: 1000"
                      print "    options: []"
                      print "  dhcpv6:"
                      print "    range_start: \"\""
                      print "    lease_duration: 86400"
                      print "    ra_slaac_only: false"
                      print "    ra_allow_slaac: false"
                    }
                    /^dhcp:/ {
                      print_dhcp_block()
                      in_dhcp = 1
                      replaced = 1
                      next
                    }
                    in_dhcp == 1 && /^[^[:space:]]/ {
                      in_dhcp = 0
                    }
                    in_dhcp == 0 { print }
                    END {
                      if (replaced == 0) {
                        print_dhcp_block()
                      }
                    }
                  ' "$CFG" > "$TMP"
                  mv "$TMP" "$CFG"
                fi

                exec /opt/adguardhome/AdGuardHome \
                  --no-check-update \
                  -c "$CFG" \
                  -w "$WORK"
            env:
              TZ: "${TIMEZONE}"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -ec
                      - |
                        test -f /adguard-data/conf/AdGuardHome.yaml
                        nc -z 127.0.0.1 80
                        nc -z 127.0.0.1 53
                  failureThreshold: 24
                  periodSeconds: 5
                  timeoutSeconds: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -ec
                      - |
                        test -f /adguard-data/conf/AdGuardHome.yaml
                        nc -z 127.0.0.1 80
                        nc -z 127.0.0.1 53
                  periodSeconds: 10
                  timeoutSeconds: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -ec
                      - |
                        test -f /adguard-data/conf/AdGuardHome.yaml
                        nc -z 127.0.0.1 80
                        nc -z 127.0.0.1 53
                  periodSeconds: 30
                  timeoutSeconds: 3
            resources:
              requests:
                cpu: "25m"
                memory: "128Mi"
              limits:
                cpu: "300m"
                memory: "512Mi"

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 80

      dns:
        controller: main
        type: LoadBalancer
        loadBalancerIP: ${ADGUARD_PRIMARY_IP}
        externalTrafficPolicy: Local
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: adguard.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: adguard.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: adguard-tls
            hosts:
              - adguard.${BASE_DOMAIN}

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: adguard-data
        globalMounts:
          - path: /adguard-data
