# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stump
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${PRIMARY_NODE_NAME}

    controllers:
      main:
        replicas: 1
        strategy: Recreate
        containers:
          main:
            image:
              repository: aaronleopold/stump
              tag: "0.1.4"
            env:
              TZ: "${TIMEZONE}"
              PUID: "1000"
              PGID: "1000"
              STUMP_CONFIG_DIR: /config
              STUMP_DB_PATH: /config
              STUMP_TRUST_PROXY_HEADERS: "true"
              STUMP_ALLOWED_ORIGINS: "https://books.${BASE_DOMAIN},https://stump.${BASE_DOMAIN}"
              STUMP_MAX_SCANNER_CONCURRENCY: "50"
              STUMP_MAX_THUMBNAIL_CONCURRENCY: "12"
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 10801
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 10801
                  initialDelaySeconds: 60
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 10801
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: "75m"
                memory: "464Mi"
              limits:
                cpu: "750m"
                memory: "1536Mi"
    service:
      main:
        controller: main
        ports:
          http:
            port: 10801

    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: books.${BASE_DOMAIN},stump.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: books.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
          - host: stump.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: stump-tls
            hosts:
              - books.${BASE_DOMAIN}
              - stump.${BASE_DOMAIN}

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: truenas-nfs
        accessMode: ReadWriteOnce
        size: 8Gi
        globalMounts:
          - path: /config

      books:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: calibre-books-nfs
        globalMounts:
          - path: /data
