# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: public-edge
spec:
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: ${UTILITY_NODE_NAME}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: cloudflare/cloudflared
              # Keep latest for pilot bootstrap; pin exact version before broad rollout.
              tag: latest
            args:
              - tunnel
              - --no-autoupdate
              - --config
              - /etc/cloudflared/config/config.yaml
              - run
              - --token
              - $(TUNNEL_TOKEN)
            env:
              - name: TUNNEL_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: cloudflared-tunnel-token
                    key: token
            resources:
              requests:
                cpu: 10m
                memory: 48Mi
              limits:
                cpu: 100m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false

    service:
      main:
        enabled: false

    ingress:
      main:
        enabled: false

    configMaps:
      config:
        enabled: true
        data:
          config.yaml: |
            # Static share host routes point to the in-cluster exposure-control backend.
            ingress:
              - hostname: blog.${BASE_DOMAIN}
                service: http://blog.default.svc.cluster.local:8080
              - hostname: mmcal.${BASE_DOMAIN}
                service: http://mmcal.default.svc.cluster.local:8080
              - hostname: rangoonmapper.${BASE_DOMAIN}
                service: http://rangoon-mapper.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}speedtest.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}chartsdb.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}booklore.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}shelfmark.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}jellyfin.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}seerr.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}audiobookshelf.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}uptime.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}sonarr.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}radarr.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}tracerr.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}tunarr.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}vaultwarden.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}immich.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}calibre.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - hostname: ${SHARE_HOST_PREFIX}calibre-manage.${BASE_DOMAIN}
                service: http://exposure-control.default.svc.cluster.local:8080
              - service: http_status:404

    persistence:
      config:
        enabled: true
        type: configMap
        identifier: config
        advancedMounts:
          main:
            main:
              - path: /etc/cloudflared/config/config.yaml
                subPath: config.yaml
                readOnly: true
