# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.0-standalone-strict/all.json
---
apiVersion: v1
kind: Service
metadata:
  name: iris-openclaw-lan
  namespace: default
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 18789
      targetPort: 18789
---
apiVersion: v1
kind: Endpoints
metadata:
  name: iris-openclaw-lan
  namespace: default
subsets:
  - addresses:
      - ip: ${IRIS_MAC_MINI_IP}
    ports:
      - name: http
        port: 18789
