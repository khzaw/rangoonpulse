# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: "11.9.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    releaseLabel: false

    nodeSelector:
      kubernetes.io/hostname: ${PRIMARY_NODE_NAME}

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

    config:
      modules:
        truenas_ui_http:
          prober: http
          timeout: 5s
          http:
            valid_http_versions:
              - HTTP/1.1
              - HTTP/2.0
            follow_redirects: true
            preferred_ip_protocol: ip4
        truenas_api_http:
          prober: http
          timeout: 5s
          http:
            valid_http_versions:
              - HTTP/1.1
              - HTTP/2.0
            follow_redirects: false
            preferred_ip_protocol: ip4
            valid_status_codes:
              - 401
        tcp_connect:
          prober: tcp
          timeout: 5s
          tcp:
            preferred_ip_protocol: ip4

    serviceMonitor:
      enabled: true
      defaults:
        labels:
          release: kube-prometheus-stack
        interval: 30s
        scrapeTimeout: 10s
      targets:
        - name: truenas-ui
          url: http://${NAS_IP}/ui/
          module: truenas_ui_http
        - name: truenas-api
          url: http://${NAS_IP}/api/v2.0/system/version/
          module: truenas_api_http
        - name: truenas-nfs
          url: tcp://${NAS_IP}:2049
          module: tcp_connect
