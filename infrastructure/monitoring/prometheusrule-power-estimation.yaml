# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.0-standalone-strict/all.json
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-power-estimation
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: node-power-estimation.rules
      interval: 1m
      rules:
        - record: homelab:node_cpu_usage_cores:rate5m
          expr: >
            sum by (node) (
              rate(
                container_cpu_usage_seconds_total{
                  job="kubelet",
                  metrics_path="/metrics/cadvisor",
                  image!="",
                  container!="",
                  container!="POD"
                }[5m]
              )
            )

        - record: homelab:node_cpu_utilization:ratio
          expr: >
            clamp_min(
              clamp_max(
                homelab:node_cpu_usage_cores:rate5m
                / on(node) machine_cpu_cores{job="kubelet",metrics_path="/metrics/cadvisor"},
                1
              ),
              0
            )

        # Tune these constants when hardware or node roles change.
        - record: homelab:node_idle_power_watts
          expr: >
            max by (node) (0 * kube_node_info{node="talos-7nf-osf"} + 20)
            or
            max by (node) (0 * kube_node_info{node="talos-uua-g6r"} + 4)

        - record: homelab:node_max_power_watts
          expr: >
            max by (node) (0 * kube_node_info{node="talos-7nf-osf"} + 75)
            or
            max by (node) (0 * kube_node_info{node="talos-uua-g6r"} + 12)

        - record: homelab:node_estimated_power_watts
          expr: >
            homelab:node_idle_power_watts
            + (
              (homelab:node_max_power_watts - homelab:node_idle_power_watts)
              * on(node) homelab:node_cpu_utilization:ratio
            )

        - record: homelab:cluster_estimated_power_watts
          expr: sum(homelab:node_estimated_power_watts)
