# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.0-standalone-strict/all.json
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-power-estimation
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: node-power-estimation.rules
      interval: 1m
      rules:
        - record: homelab:node_cpu_usage_cores:rate5m
          expr: >
            sum by (node) (
              rate(
                container_cpu_usage_seconds_total{
                  job="kubelet",
                  metrics_path="/metrics/cadvisor",
                  image!="",
                  container!="",
                  container!="POD"
                }[5m]
              )
            )

        - record: homelab:node_cpu_utilization:ratio
          expr: >
            clamp_min(
              clamp_max(
                homelab:node_cpu_usage_cores:rate5m
                / on(node) machine_cpu_cores{job="kubelet",metrics_path="/metrics/cadvisor"},
                1
              ),
              0
            )

        # Prefer whole-host CPU utilization from kubelet /metrics/resource when present.
        # Fall back to container-only utilization if the host-level series is absent.
        - record: homelab:node_power_model_cpu_utilization:ratio
          expr: >
            homelab:node_host_cpu_utilization:ratio
            or
            homelab:node_cpu_utilization:ratio

        # Tune these constants when hardware or node roles change.
        - record: homelab:node_idle_power_watts
          expr: >
            max by (node) (0 * kube_node_info{node="${PRIMARY_NODE_NAME}"} + 20)
            or
            max by (node) (0 * kube_node_info{node="${UTILITY_NODE_NAME}"} + 4)

        - record: homelab:node_max_power_watts
          expr: >
            max by (node) (0 * kube_node_info{node="${PRIMARY_NODE_NAME}"} + 75)
            or
            max by (node) (0 * kube_node_info{node="${UTILITY_NODE_NAME}"} + 12)

        - record: homelab:node_estimated_power_watts
          expr: >
            homelab:node_idle_power_watts
            + (
              (homelab:node_max_power_watts - homelab:node_idle_power_watts)
              * on(node) homelab:node_power_model_cpu_utilization:ratio
            )

        - record: homelab:cluster_estimated_power_watts
          expr: sum(homelab:node_estimated_power_watts)

        # Q1 2026 Singapore regulated household tariff (with 9% GST):
        # 29.11 cents/kWh for 1 Jan 2026 to 31 Mar 2026.
        - record: homelab:singapore_household_tariff_sgd_per_kwh
          expr: vector(0.2911)
