# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.0-standalone-strict/configmap-v1.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-capacity-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: node-capacity-overview
data:
  node-capacity-overview.json: |
    {
      "uid": "node-capacity-overview",
      "title": "Node Capacity Overview",
      "timezone": "browser",
      "schemaVersion": 41,
      "version": 1,
      "refresh": "1m",
      "tags": ["nodes", "cpu", "memory", "capacity", "homelab"],
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "refresh": 1
          },
          {
            "name": "node",
            "label": "Node",
            "type": "query",
            "datasource": {
              "uid": "$datasource"
            },
            "query": {
              "query": "label_values(homelab:node_host_cpu_utilization:ratio, node)",
              "refId": "NodeVariableQuery"
            },
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": "All",
              "value": ".*"
            },
            "refresh": 2
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": {
              "uid": "$datasource"
            },
            "query": {
              "query": "label_values(kube_pod_info{node=~\"$node\"}, namespace)",
              "refId": "NamespaceVariableQuery"
            },
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": "All",
              "value": ".*"
            },
            "refresh": 2
          },
          {
            "name": "workload",
            "label": "Workload",
            "type": "query",
            "datasource": {
              "uid": "$datasource"
            },
            "query": {
              "query": "label_values(namespace_workload_pod:kube_pod_owner:relabel{namespace=~\"$namespace\"}, workload)",
              "refId": "WorkloadVariableQuery"
            },
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": "All",
              "value": ".*"
            },
            "refresh": 2
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "datasource": {
              "uid": "$datasource"
            },
            "query": {
              "query": "label_values(kube_pod_info{node=~\"$node\",namespace=~\"$namespace\"}, pod)",
              "refId": "PodVariableQuery"
            },
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": "All",
              "value": ".*"
            },
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "Notes",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "Top panels use whole-host kubelet `/metrics/resource` metrics for CPU and RAM. Drilldown panels use pod metrics joined with workload owner labels. `Workload` is the owning Deployment/StatefulSet/DaemonSet rather than a Kubernetes `Service` object, because pod resource usage attaches cleanly to workloads, not to services."
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Selected Scope RAM Used",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(homelab:node_host_memory_working_set_bytes{node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 1
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Selected Scope RAM Total",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 4,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(machine_memory_bytes{job=\"kubelet\",metrics_path=\"/metrics/cadvisor\",node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 1
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Selected Scope RAM %",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 8,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(homelab:node_host_memory_working_set_bytes{node=~\"$node\"}) / sum(machine_memory_bytes{job=\"kubelet\",metrics_path=\"/metrics/cadvisor\",node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.7
                  },
                  {
                    "color": "red",
                    "value": 0.85
                  }
                ]
              }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Selected Scope CPU Used",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(homelab:node_host_cpu_usage_cores:rate5m{node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "decimals": 2
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Selected Scope CPU Total",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 16,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(machine_cpu_cores{job=\"kubelet\",metrics_path=\"/metrics/cadvisor\",node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "decimals": 0
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Selected Scope CPU %",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 20,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(homelab:node_host_cpu_usage_cores:rate5m{node=~\"$node\"}) / sum(machine_cpu_cores{job=\"kubelet\",metrics_path=\"/metrics/cadvisor\",node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.6
                  },
                  {
                    "color": "red",
                    "value": 0.8
                  }
                ]
              }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 8,
          "type": "bargauge",
          "title": "Host RAM Utilization by Node",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 9
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_host_memory_utilization:ratio{node=~\"$node\"}",
              "legendFormat": "{{node}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.7
                  },
                  {
                    "color": "red",
                    "value": 0.85
                  }
                ]
              }
            }
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            },
            "showUnfilled": true
          }
        },
        {
          "id": 9,
          "type": "bargauge",
          "title": "Host CPU Utilization by Node",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 9
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_host_cpu_utilization:ratio{node=~\"$node\"}",
              "legendFormat": "{{node}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.6
                  },
                  {
                    "color": "red",
                    "value": 0.8
                  }
                ]
              }
            }
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            },
            "showUnfilled": true
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Host RAM % by Node",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_host_memory_utilization:ratio{node=~\"$node\"}",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "min": 0,
              "max": 1
            }
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Host CPU % by Node",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_host_cpu_utilization:ratio{node=~\"$node\"}",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "min": 0,
              "max": 1
            }
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        },
        {
          "id": 12,
          "type": "bargauge",
          "title": "Top Workloads by RAM",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 24
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "topk(15, sum by (namespace, workload) (pod_memory_working_set_bytes{job=\"kubelet\",metrics_path=\"/metrics/resource\",namespace=~\"$namespace\",pod=~\"$pod\"} * on(namespace, pod) group_left(workload) namespace_workload_pod:kube_pod_owner:relabel{namespace=~\"$namespace\",workload=~\"$workload\"} * on(namespace, pod) group_left(node) kube_pod_info{node=~\"$node\"}))",
              "legendFormat": "{{namespace}}/{{workload}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 1
            }
          },
          "options": {
            "displayMode": "basic",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            },
            "showUnfilled": true
          }
        },
        {
          "id": 13,
          "type": "bargauge",
          "title": "Top Workloads by CPU",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 24
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "topk(15, sum by (namespace, workload) (rate(pod_cpu_usage_seconds_total{job=\"kubelet\",metrics_path=\"/metrics/resource\",namespace=~\"$namespace\",pod=~\"$pod\"}[5m]) * on(namespace, pod) group_left(workload) namespace_workload_pod:kube_pod_owner:relabel{namespace=~\"$namespace\",workload=~\"$workload\"} * on(namespace, pod) group_left(node) kube_pod_info{node=~\"$node\"}))",
              "legendFormat": "{{namespace}}/{{workload}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "decimals": 2
            }
          },
          "options": {
            "displayMode": "basic",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            },
            "showUnfilled": true
          }
        },
        {
          "id": 14,
          "type": "bargauge",
          "title": "Top Pods by RAM",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 33
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "topk(15, sum by (namespace, pod) (pod_memory_working_set_bytes{job=\"kubelet\",metrics_path=\"/metrics/resource\",namespace=~\"$namespace\",pod=~\"$pod\"} * on(namespace, pod) group_left(node) kube_pod_info{node=~\"$node\"}))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 1
            }
          },
          "options": {
            "displayMode": "basic",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            },
            "showUnfilled": true
          }
        },
        {
          "id": 15,
          "type": "bargauge",
          "title": "Top Pods by CPU",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 33
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "topk(15, sum by (namespace, pod) (rate(pod_cpu_usage_seconds_total{job=\"kubelet\",metrics_path=\"/metrics/resource\",namespace=~\"$namespace\",pod=~\"$pod\"}[5m]) * on(namespace, pod) group_left(node) kube_pod_info{node=~\"$node\"}))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "decimals": 2
            }
          },
          "options": {
            "displayMode": "basic",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            },
            "showUnfilled": true
          }
        }
      ]
    }
