# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.0-standalone-strict/configmap-v1.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-power-estimation
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: node-power-estimation
data:
  node-power-estimation.json: |
    {
      "uid": "node-power-estimation",
      "title": "Node Power Estimation",
      "timezone": "browser",
      "schemaVersion": 41,
      "version": 1,
      "refresh": "1m",
      "tags": ["power", "homelab", "estimated"],
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "refresh": 1
          },
          {
            "name": "node",
            "type": "query",
            "datasource": {
              "uid": "$datasource"
            },
            "query": {
              "query": "label_values(homelab:node_estimated_power_watts, node)",
              "refId": "NodeVariableQuery"
            },
            "multi": false,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": "All",
              "value": ".*"
            },
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "Model Notes",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "Estimated node watts are derived from container CPU utilization and fixed idle/max constants per node. This is not wall-power telemetry. Tune constants in `infrastructure/monitoring/prometheusrule-power-estimation.yaml` when hardware changes."
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Cluster Estimated Power",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(homelab:node_estimated_power_watts)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 1
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Cluster Estimated Energy (24h)",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(avg_over_time(homelab:node_estimated_power_watts[24h])) * 24 / 1000",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "kWh",
              "decimals": 2
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Selected Scope Estimated Power",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(homelab:node_estimated_power_watts{node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 1
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Selected Scope CPU Utilization",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "avg(homelab:node_cpu_utilization:ratio{node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Estimated Power by Node",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_estimated_power_watts{node=~\"$node\"}",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 1
            }
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "CPU Utilization by Node (Model Input)",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 17
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_cpu_utilization:ratio{node=~\"$node\"}",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 2
            }
          }
        }
      ]
    }
