# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.0-standalone-strict/configmap-v1.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-power-estimation
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: node-power-estimation
data:
  node-power-estimation.json: |
    {
      "uid": "node-power-estimation",
      "title": "Node Power Estimation",
      "timezone": "browser",
      "schemaVersion": 41,
      "version": 2,
      "refresh": "1m",
      "tags": ["power", "homelab", "estimated", "hardware"],
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "refresh": 1
          },
          {
            "name": "node",
            "type": "query",
            "datasource": {
              "uid": "$datasource"
            },
            "query": {
              "query": "label_values(homelab:node_estimated_power_watts, node)",
              "refId": "NodeVariableQuery"
            },
            "multi": false,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": "All",
              "value": ".*"
            },
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "Model Notes",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "Estimated node watts are derived from fixed idle/max node constants plus CPU utilization. The model now prefers whole-host kubelet `/metrics/resource` CPU when available, and falls back to container CPU utilization otherwise. Energy and cost stats use the active Grafana time range. Cost uses the Singapore regulated household tariff pinned in Prometheus for `1 January 2026` through `31 March 2026` (`29.11` cents/kWh, GST inclusive). The utility-node Raspberry Pi now also exposes a live low-voltage alarm from hardware telemetry so power trouble is visible before workloads crash."
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Cluster Estimated Power",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(homelab:node_estimated_power_watts{node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 1
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Selected Scope Estimated Energy",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 4,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(avg_over_time(homelab:node_estimated_power_watts{node=~\"$node\"}[$__range])) * $__range_s / 3600000",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "kWh",
              "decimals": 2
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Selected Scope Estimated Cost",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 8,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "(sum(avg_over_time(homelab:node_estimated_power_watts{node=~\"$node\"}[$__range])) * $__range_s / 3600000) * max(homelab:singapore_household_tariff_sgd_per_kwh)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "prefix:S$",
              "decimals": 2
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Cluster Estimated Power",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(homelab:node_estimated_power_watts)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 1
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Cluster Estimated Energy",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 16,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "sum(avg_over_time(homelab:node_estimated_power_watts[$__range])) * $__range_s / 3600000",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "kWh",
              "decimals": 2
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Cluster Estimated Cost",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 20,
            "y": 4
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "(sum(avg_over_time(homelab:node_estimated_power_watts[$__range])) * $__range_s / 3600000) * max(homelab:singapore_household_tariff_sgd_per_kwh)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "prefix:S$",
              "decimals": 2
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Singapore Tariff (Q1 2026)",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 9
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "max(homelab:singapore_household_tariff_sgd_per_kwh)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "prefix:S$",
              "decimals": 4
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 9,
          "type": "stat",
          "title": "Selected Scope CPU Utilization (Model Input)",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 9
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "avg(homelab:node_power_model_cpu_utilization:ratio{node=~\"$node\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Estimated Power by Node",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 9
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_estimated_power_watts{node=~\"$node\"}",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 1
            }
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "CPU Utilization by Node (Model Input)",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 17
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_power_model_cpu_utilization:ratio{node=~\"$node\"}",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 2
            }
          }
        },
        {
          "id": 12,
          "type": "stat",
          "title": "Utility Node Low-Voltage Alarm",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 25
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "max(homelab:node_rpi_low_voltage_alarm{node=\"${UTILITY_NODE_NAME}\"}) or on() vector(0)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "Clear",
                      "color": "green"
                    },
                    "1": {
                      "text": "Low Voltage",
                      "color": "red"
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 13,
          "type": "stat",
          "title": "Utility Node Low-Voltage Seen In Range",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 25
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "max(max_over_time(homelab:node_rpi_low_voltage_alarm{node=\"${UTILITY_NODE_NAME}\"}[$__range])) or on() vector(0)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "Not Seen",
                      "color": "green"
                    },
                    "1": {
                      "text": "Seen",
                      "color": "red"
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Utility Node Low-Voltage Alarm History",
          "datasource": {
            "uid": "$datasource"
          },
          "gridPos": {
            "h": 4,
            "w": 16,
            "x": 8,
            "y": 25
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "$datasource"
              },
              "expr": "homelab:node_rpi_low_voltage_alarm{node=\"${UTILITY_NODE_NAME}\"}",
              "legendFormat": "low-voltage alarm"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          }
        }
      ]
    }
