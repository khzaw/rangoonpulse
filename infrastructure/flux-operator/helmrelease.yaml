# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 24h
  timeout: 10m
  chart:
    spec:
      chart: flux-operator
      version: "0.54.0"
      sourceRef:
        kind: HelmRepository
        name: controlplaneio-fluxcd
        namespace: flux-system
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  values:
    nodeSelector:
      kubernetes.io/hostname: ${PRIMARY_NODE_NAME}

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    web:
      enabled: true
      ingress:
        enabled: true
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/hostname: fluxui.${BASE_DOMAIN}
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: fluxui.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: fluxui-tls
            hosts:
              - fluxui.${BASE_DOMAIN}
