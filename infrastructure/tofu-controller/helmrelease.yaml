# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: tofu-controller
      version: "0.16.2"
      sourceRef:
        kind: HelmRepository
        name: tofu-controller
        namespace: flux-system
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }

  values:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    extraEnv:
      GOMEMLIMIT: 384MiB
    runner:
      resources:
        requests:
          cpu: 100m
          memory: 192Mi
        limits:
          cpu: 600m
          memory: 768Mi
