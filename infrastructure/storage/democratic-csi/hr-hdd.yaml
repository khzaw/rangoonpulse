# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi-hdd
  namespace: democratic-csi
spec:
  interval: 6h
  chart:
    spec:
      chart: democratic-csi
      version: "0.15.1"
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: flux-system
  values:
    csiDriver:
      name: "org.democratic-csi.nfs-hdd"

    controller:
      enabled: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      externalAttacher:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      externalProvisioner:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      externalResizer:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      externalSnapshotter:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      driver:
        image:
          tag: next
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

    node:
      enabled: true
      cleanup:
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
      driver:
        image:
          tag: next
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
      driverRegistrar:
        resources:
          requests:
            cpu: 20m
            memory: 48Mi
          limits:
            cpu: 200m
            memory: 128Mi

    csiProxy:
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi

    storageClasses:
      - name: truenas-nfs
        defaultClass: true
        reclaimPolicy: Retain
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        parameters:
          fsType: nfs
        mountOptions:
          - noatime
          - nfsvers=4.1

      - name: truenas-hdd-media
        defaultClass: false
        reclaimPolicy: Retain
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        parameters:
          fsType: nfs
        mountOptions:
          - noatime
          - nfsvers=4.1

    driver:
      config:
        driver: freenas-api-nfs
        instance_id: "truenas-nfs-hdd"
        httpConnection:
          protocol: http
          host: ${NAS_IP}
          port: 80
          allowInsecure: true
          apiVersion: 2
        zfs:
          datasetParentName: tank/k8s/storage
          detachedSnapshotsDatasetParentName: tank/k8s/snapshots
          datasetEnableQuotas: true
          datasetEnableReservation: true
          datasetPermissionsMode: "0777"
          datasetPermissionsUser: 0
          datasetPermissionsGroup: 0
          datasetProperties:
            "org.freenas:description": "{{ parameters.[csi.storage.k8s.io/pvc/namespace] }}/{{ parameters.[csi.storage.k8s.io/pvc/name] }}"
        nfs:
          shareHost: ${NAS_IP}
          shareAllowedNetworks: ["10.0.0.0/8"]
          shareMaprootUser: ""
          shareMaprootGroup: ""
          shareMapallUser: root
          shareMapallGroup: root

  valuesFrom:
    - kind: Secret
      name: truenas-credentials
      valuesKey: username
      targetPath: driver.config.httpConnection.username
    - kind: Secret
      name: truenas-credentials
      valuesKey: password
      targetPath: driver.config.httpConnection.password
